<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裝置規格詳細偵測</title>
    <!-- 引入專業的裝置識別資料庫 -->
    <script type="text/javascript" src="//wurfl.io/wurfl.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: #1e1e1e; width: 90%; max-width: 450px; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #007aff; text-align: center; margin-bottom: 25px; }
        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a2a; }
        .label { color: #888; font-size: 0.9rem; }
        .value { color: #00ff88; font-weight: bold; font-size: 1rem; text-align: right; }
        .footer { font-size: 0.7rem; color: #555; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>裝置識別報告</h2>
    
    <div class="row">
        <span class="label">精確機型名稱：</span>
        <span class="value" id="model-name">偵測中...</span>
    </div>

    <div class="row">
        <span class="label">作業系統版本：</span>
        <span class="value" id="os-version">偵測中...</span>
    </div>

    <div class="row">
        <span class="label">螢幕解析度：</span>
        <span class="value" id="screen-res">-</span>
    </div>

    <div class="row">
        <span class="label">裝置分類：</span>
        <span class="value" id="device-type">-</span>
    </div>

    <div class="footer">
        * 資訊由 WURFL 雲端資料庫與瀏覽器特徵交叉比對生成
    </div>
</div>

<script>
window.onload = function() {
    const modelEl = document.getElementById('model-name');
    const osEl = document.getElementById('os-version');
    const resEl = document.getElementById('screen-res');
    const typeEl = document.getElementById('device-type');

    // 1. 顯示螢幕解析度 (物理參數)
    resEl.innerText = window.screen.width + " x " + window.screen.height + " (DPR: " + window.devicePixelRatio + ")";

    // 2. 獲取精確型號 (WURFL Cloud)
    if (typeof WURFL !== 'undefined') {
        modelEl.innerText = WURFL.complete_device_name;
        typeEl.innerText = WURFL.form_factor;
    } else {
        modelEl.innerText = "無法連線資料庫";
    }

    // 3. 獲取系統版本 (解析 User Agent)
    const ua = navigator.userAgent;
    let version = "未知版本";
    
    if (/iPhone|iPad|iPod/.test(ua)) {
        const match = ua.match(/OS (\d+)_(\d+)_?(\d+)?/);
        if (match) version = "iOS " + match[1] + "." + match[2] + (match[3] ? "." + match[3] : "");
    } else if (/Android/.test(ua)) {
        const match = ua.match(/Android (\d+(\.\d+)?)/);
        if (match) version = "Android " + match[1];
    } else {
        version = "非行動裝置";
    }
    osEl.innerText = version;
};
</script>

</body>
</html>
