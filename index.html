<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Load Test Panel (Infinite Mode)</title>
<style>
body{
    background:#0b0b0b; color:#00ff9c; font-family:monospace; text-align:center; padding-top:80px;
}
.panel{
    border:1px solid #00ff9c; width:380px; margin:auto; padding:20px; box-shadow:0 0 20px #00ff9c44;
}
input{ width:90%; padding:8px; margin:6px; background:#111; border:1px solid #00ff9c; color:#00ff9c; }
button{ padding:10px 20px; margin:5px; background:#00ff9c; border:none; cursor:pointer; font-weight:bold; }
button:hover{ background:#00cc7a; }
#status{ margin-top:15px; font-size: 0.9em; line-height: 1.5; }
.count { color: #fff; }
</style>
</head>
<body>

<div class="panel">
    <h2>LOAD TEST PANEL (Infinite)</h2>
    <input id="url" placeholder="https://your-api-link.com" value="https://">
    <input id="users" type="number" placeholder="每秒請求數 (例如: 10)">
    <br>
    <button onclick="startTest()">開始測試</button>
    <button onclick="stopTest()">強制停止</button>
    <div id="status">準備就緒</div>
</div>

<script>
let running = false;
let intervalId = null;
let successCount = 0;
let errorCount = 0;

function startTest() {
    if (running) return;

    const url = document.getElementById("url").value.trim();
    const usersPerSec = parseInt(document.getElementById("users").value);

    if (!url || !usersPerSec) {
        alert("請完整填寫網址與每秒請求數");
        return;
    }

    running = true;
    successCount = 0;
    errorCount = 0;
    const startTime = Date.now();
    updateStatus("初始化中...");

    intervalId = setInterval(() => {
        if (!running) return;

        for (let i = 0; i < usersPerSec; i++) {
            fetch(url, { mode: 'no-cors' })
                .then(() => { successCount++; })
                .catch(() => { errorCount++; })
                .finally(() => updateProgress());
        }

        const elapsed = ((Date.now() - startTime)/1000).toFixed(1);
        document.getElementById("status").innerHTML += `<br>運行時間: ${elapsed}s`;
    }, 1000);
}

function updateProgress() {
    if (!running) return;
    document.getElementById("status").innerHTML = 
        `狀態: <span style="color:yellow">運行中...</span><br>` +
        `成功次數: <span class="count">${successCount}</span><br>` +
        `失敗次數: <span class="count">${errorCount}</span>`;
}

function updateStatus(msg) {
    document.getElementById("status").innerText = msg;
}

function stopTest(reason = "測試已停止") {
    if (!running) return;

    running = false;
    if (intervalId) clearInterval(intervalId);
    intervalId = null;

    document.getElementById("status").innerHTML = 
        `<span style="color:red">${reason}</span><br>` +
        `最終統計 - 成功: ${successCount}, 失敗: ${errorCount}`;
}
</script>

</body>
</html>
