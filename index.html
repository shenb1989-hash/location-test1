<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精確裝置檢測器</title>
    <!-- 引入專業的裝置識別腳本 -->
    <script type="text/javascript" src="//wurfl.io/wurfl.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 90%; }
        h1 { color: #1a73e8; font-size: 1.5rem; }
        .info { margin-top: 20px; font-size: 1.2rem; color: #333; line-height: 1.6; }
        .detail { color: #666; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1>您的裝置資訊</h1>
    <div id="loading">偵測中，請稍候...</div>
    <div class="info" id="device-name"></div>
    <div class="detail" id="ua-string"></div>
</div>

<script>
    window.onload = function() {
        const loading = document.getElementById('loading');
        const deviceDisplay = document.getElementById('device-name');
        const uaDisplay = document.getElementById('ua-string');

        try {
            // WURFL 物件包含經過雲端比對後的精確名稱
            if (typeof WURFL !== 'undefined') {
                loading.style.display = 'none';
                deviceDisplay.innerHTML = `
                    <strong>品牌與型號：</strong><br>${WURFL.complete_device_name}<br>
                    <strong>類型：</strong>${WURFL.form_factor}
                `;
                uaDisplay.innerText = "瀏覽器特徵 (UA): " + navigator.userAgent;
            } else {
                throw new Error("無法載入偵測模組");
            }
        } catch (e) {
            loading.innerText = "偵測失敗，可能受限於瀏覽器隱私設定。";
            deviceDisplay.innerText = "基本偵測：" + navigator.platform;
        }
    };
</script>

</body>
</html>
